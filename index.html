<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>카드뉴스 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f2f2ee;min-height:100vh;font-size:14px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:100}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:500;color:#999;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
.tab.active{color:#111;border-bottom-color:#111}
.section{display:none;padding:16px}
.section.active{display:block}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.btn-group{display:flex;gap:7px;flex-wrap:wrap}
.btn-opt{padding:8px 13px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:13px;color:#555;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-opt.active{border-color:#111;background:#111;color:#fff}
.lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.inp{width:100%;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:14px;font-family:inherit;color:#111;background:#fff;resize:vertical;outline:none;transition:border-color .15s}
.inp:focus{border-color:#111}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ig{margin-bottom:12px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f3f3f3}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:14px;color:#333}
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.2s}
.sl:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:#111}
.sw input:checked+.sl:before{transform:translateX(20px)}
.range-row{display:flex;align-items:center;gap:10px}
.range-row input[type=range]{flex:1}
.rv{font-size:13px;color:#666;min-width:40px;text-align:right}
.color-row{display:flex;align-items:center;gap:10px}
.swatch{width:36px;height:36px;border-radius:9px;border:1.5px solid #e0e0e0;overflow:hidden;flex-shrink:0}
.swatch input{width:200%;height:200%;margin:-50%;border:none;cursor:pointer}

/* 이미지 크롭 인터랙션 */
.crop-wrap{position:relative;width:100%;overflow:hidden;border-radius:10px;background:#111;touch-action:none;cursor:grab;user-select:none}
.crop-wrap:active{cursor:grabbing}
.crop-wrap canvas{display:block;width:100%;height:auto;pointer-events:none}
.crop-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;pointer-events:none;white-space:nowrap;opacity:1;transition:opacity .4s}
.crop-hint.hide{opacity:0}

.preview-wrap{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px}
.img-up{border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;cursor:pointer;color:#bbb;font-size:13px;background:#fafafa;transition:all .15s;margin-bottom:0}
.img-up:hover{border-color:#aaa;background:#f5f5f5}
.slide-item{background:#fff;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;border:2px solid transparent;transition:all .15s;margin-bottom:9px}
.slide-item.active{border-color:#111}
.slide-num{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#666;flex-shrink:0}
.slide-item.active .slide-num{background:#111;color:#fff}
.slide-info{flex:1;min-width:0}
.slide-title-txt{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slide-sub{font-size:12px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slide-thumb{width:44px;height:44px;border-radius:8px;background:#eee;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:18px}
.slide-thumb img{width:100%;height:100%;object-fit:cover}
.add-btn{width:100%;background:#fff;border:1.5px dashed #ccc;border-radius:12px;padding:14px;text-align:center;color:#aaa;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.exp-btn{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.exp-btn2{width:100%;padding:14px;background:#fff;color:#111;border:1.5px solid #111;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#555;padding:2px 6px 2px 0}
.editor-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.editor-hdr-title{font-size:16px;font-weight:700}
.empty-state{text-align:center;padding:48px 20px;color:#ccc}
.sep{height:1px;background:#f3f3f3;margin:8px 0 12px}
.reset-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:7px 13px;font-size:12px;color:#888;cursor:pointer;font-family:inherit;margin-top:8px}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="go('setup')">설정</div>
  <div class="tab" onclick="go('slides')">슬라이드</div>
  <div class="tab" onclick="go('editor')">편집</div>
</div>

<!-- 설정 -->
<div class="section active" id="tab-setup">
  <div class="card">
    <div class="card-title">규격</div>
    <div class="btn-group">
      <button class="btn-opt active" onclick="setFmt(this)" data-w="1080" data-h="1080" data-r="1:1">피드 1:1</button>
      <button class="btn-opt" onclick="setFmt(this)" data-w="1080" data-h="1440" data-r="3:4">피드 3:4</button>
      <button class="btn-opt" onclick="setFmt(this)" data-w="1080" data-h="1350" data-r="4:5">피드 4:5</button>
      <button class="btn-opt" onclick="setFmt(this)" data-w="1080" data-h="1920" data-r="9:16">릴스 9:16</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">매거진 이름</div>
    <div class="ig"><label class="lbl">이름</label><input class="inp" id="mag-name" value="tff.office" oninput="S.magName=this.value"></div>
    <div class="ig"><label class="lbl">크기</label>
      <div class="range-row"><input type="range" min="20" max="60" value="32" id="mag-size" oninput="S.magSize=+this.value;document.getElementById('msv').textContent=this.value+'px'"><span class="rv" id="msv">32px</span></div>
    </div>
    <div class="ig"><label class="lbl">색상</label>
      <div class="color-row"><div class="swatch"><input type="color" id="mag-color" value="#ffffff" oninput="S.magColor=this.value"></div><span style="font-size:12px;color:#aaa">우하단 고정</span></div>
    </div>
    <div class="ig" style="margin-bottom:0"><label class="lbl">불투명도</label>
      <div class="range-row"><input type="range" min="10" max="100" value="70" id="mag-opacity" oninput="S.magOpacity=+this.value;document.getElementById('mov').textContent=this.value+'%'"><span class="rv" id="mov">70%</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">기본 폰트</div>
    <select class="inp" id="global-font" onchange="S.globalFont=this.value">
      <option value="Pretendard Variable">Pretendard</option>
      <option value="'Apple SD Gothic Neo', sans-serif">Apple SD Gothic Neo</option>
      <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
    </select>
  </div>
  <button class="exp-btn" onclick="go('slides');addIfEmpty()">슬라이드 만들기 →</button>
</div>

<!-- 슬라이드 목록 -->
<div class="section" id="tab-slides">
  <div id="slide-list"></div>
  <button class="add-btn" onclick="addSlide()">+ 슬라이드 추가</button>
</div>

<!-- 편집 -->
<div class="section" id="tab-editor">
  <div id="ed-empty" class="empty-state"><div style="font-size:36px;margin-bottom:12px">🖼</div><p style="font-size:14px">슬라이드 탭에서<br>편집할 슬라이드를 선택하세요</p></div>
  <div id="ed-content" style="display:none">
    <div class="editor-hdr">
      <button class="back-btn" onclick="go('slides')">←</button>
      <div class="editor-hdr-title" id="ed-title">슬라이드 1</div>
    </div>

    <!-- 미리보기 + 크롭 인터랙션 -->
    <div class="preview-wrap">
      <div class="crop-wrap" id="crop-wrap">
        <canvas id="cv"></canvas>
        <div class="crop-hint" id="crop-hint">드래그로 위치 · 핀치로 크기 조절</div>
      </div>
    </div>

    <!-- 이미지 -->
    <div class="card">
      <div class="card-title">이미지</div>
      <div class="img-up" onclick="document.getElementById('fi').click()">
        <div style="font-size:26px;margin-bottom:6px">📷</div>
        <div>탭해서 이미지 업로드</div>
        <div style="font-size:11px;margin-top:3px;color:#ccc">JPG · PNG · WebP</div>
      </div>
      <input type="file" id="fi" style="display:none" accept="image/*" onchange="loadImg(this)">
      <div class="ig" style="margin-top:12px;margin-bottom:0">
        <label class="lbl">이미지 크기 (줌)</label>
        <div class="range-row">
          <input type="range" min="50" max="300" value="100" step="1" id="s-zoom" oninput="document.getElementById('zmv').textContent=this.value+'%';onZoom()">
          <span class="rv" id="zmv">100%</span>
        </div>
      </div>
      <button class="reset-btn" onclick="resetCrop()">↺ 위치·크기 초기화</button>
    </div>

    <!-- 컴포넌트 -->
    <div class="card">
      <div class="card-title">컴포넌트</div>
      <div class="toggle-row"><span class="toggle-label">가로형 이미지 레이아웃</span><label class="sw"><input type="checkbox" id="t-wide" onchange="sync();draw()"><span class="sl"></span></label></div>
      <div class="toggle-row"><span class="toggle-label">카피 (주 텍스트)</span><label class="sw"><input type="checkbox" id="t-copy" checked onchange="sync();draw()"><span class="sl"></span></label></div>
      <div class="toggle-row"><span class="toggle-label">설명문 (중)</span><label class="sw"><input type="checkbox" id="t-desc" onchange="showHide();sync();draw()"><span class="sl"></span></label></div>
      <div class="toggle-row"><span class="toggle-label">각주 (소)</span><label class="sw"><input type="checkbox" id="t-foot" onchange="showHide();sync();draw()"><span class="sl"></span></label></div>
      <div class="toggle-row"><span class="toggle-label">슬라이드 번호</span><label class="sw"><input type="checkbox" id="t-num" onchange="sync();draw()"><span class="sl"></span></label></div>
    </div>

    <!-- 텍스트 -->
    <div class="card">
      <div class="card-title">텍스트 입력</div>
      <div class="ig"><label class="lbl">카피</label><textarea class="inp" id="i-copy" rows="2" placeholder="짧고 강렬하게" oninput="sync();draw()"></textarea></div>
      <div class="ig" id="g-desc" style="display:none"><label class="lbl">설명문 (중)</label><textarea class="inp" id="i-desc" rows="3" placeholder="부연 설명" oninput="sync();draw()"></textarea></div>
      <div class="ig" id="g-foot" style="display:none;margin-bottom:0"><label class="lbl">각주 (소)</label><input class="inp" id="i-foot" placeholder="출처·각주 등 작은 텍스트" oninput="sync();draw()"></div>
    </div>

    <!-- 스타일 -->
    <div class="card">
      <div class="card-title">스타일</div>
      <div class="row2">
        <div><label class="lbl">폰트</label>
          <select class="inp" id="s-font" onchange="sync();draw()">
            <option value="global">기본 폰트</option>
            <option value="Pretendard Variable">Pretendard</option>
            <option value="'Apple SD Gothic Neo'">Apple SD Neo</option>
            <option value="serif">Serif</option>
          </select>
        </div>
        <div><label class="lbl">카피 크기</label>
          <select class="inp" id="s-csize" onchange="sync();draw()">
            <option value="52">작게</option>
            <option value="68">보통</option>
            <option value="76" selected>크게</option>
            <option value="104">매우 크게</option>
          </select>
        </div>
      </div>
      <div class="ig"><label class="lbl">텍스트 색상</label>
        <div class="color-row"><div class="swatch"><input type="color" id="s-color" value="#ffffff" onchange="sync();draw()"></div><span style="font-size:12px;color:#aaa">카피·설명문·각주 공통</span></div>
      </div>
      <div class="sep"></div>
      <div class="ig"><label class="lbl">자간 (letter-spacing)</label>
        <div class="range-row"><input type="range" min="-10" max="40" value="0" step="1" id="s-tracking" oninput="document.getElementById('trv').textContent=this.value+'px';sync();draw()"><span class="rv" id="trv">0px</span></div>
      </div>
      <div class="ig"><label class="lbl">카피 행간</label>
        <div class="range-row"><input type="range" min="80" max="200" value="125" step="1" id="s-lh-copy" oninput="document.getElementById('lhcv').textContent=(this.value/100).toFixed(2);sync();draw()"><span class="rv" id="lhcv">1.25</span></div>
      </div>
      <div class="ig" style="margin-bottom:0"><label class="lbl">설명문 행간</label>
        <div class="range-row"><input type="range" min="80" max="200" value="145" step="1" id="s-lh-desc" oninput="document.getElementById('lhdv').textContent=(this.value/100).toFixed(2);sync();draw()"><span class="rv" id="lhdv">1.45</span></div>
      </div>
      <div class="sep"></div>
      <div class="ig"><label class="lbl">오버레이 종류</label>
        <div class="btn-group">
          <button class="btn-opt active" onclick="setOvType(this,'gradient')" data-v="gradient">그라디언트</button>
          <button class="btn-opt" onclick="setOvType(this,'solid')" data-v="solid">단색</button>
          <button class="btn-opt" onclick="setOvType(this,'none')" data-v="none">없음</button>
        </div>
      </div>
      <div class="ig" id="ov-color-row" style="display:none"><label class="lbl">오버레이 색상</label>
        <div class="color-row"><div class="swatch"><input type="color" id="s-ovcolor" value="#000000" onchange="sync();draw()"></div></div>
      </div>
      <div class="ig"><label class="lbl">오버레이 강도</label>
        <div class="range-row"><input type="range" min="0" max="95" value="55" id="s-opacity" oninput="document.getElementById('opv').textContent=this.value+'%';sync();draw()"><span class="rv" id="opv">55%</span></div>
      </div>
      <div class="ig" style="margin-bottom:0"><label class="lbl">오버레이 시작 위치</label>
        <div class="range-row"><input type="range" min="0" max="100" value="45" id="s-ovstart" oninput="document.getElementById('osv').textContent=this.value+'%';sync();draw()"><span class="rv" id="osv">45%</span></div>
      </div>
    </div>

    <button class="exp-btn" onclick="exportOne()">💾 이 슬라이드 저장</button>
    <button class="exp-btn2" onclick="exportAll()">📦 전체 저장</button>
  </div>
</div>

<script>
const MAG_FONT="'Barlow Condensed','Arial Narrow',sans-serif";
const S={
  fmt:{w:1080,h:1080,r:'1:1'},
  globalFont:'Pretendard Variable',
  magName:'tff.office', magSize:32, magColor:'#ffffff', magOpacity:70,
  slides:[], cur:null,
};

function mkSlide(name){
  return{
    id:Date.now()+Math.random(), name,
    img:null, imgEl:null,
    copy:'', desc:'', foot:'',
    showCopy:true, showDesc:false, showFoot:false, showNum:false, wide:false,
    font:'global', csize:76, textColor:'#ffffff',
    tracking:0, lhCopy:1.25, lhDesc:1.45,
    ovType:'gradient', ovColor:'#000000', opacity:55, ovStart:45,
    // 크롭 상태
    cropX:0, cropY:0, cropZoom:1,
  };
}

function addSlide(name){
  const n=name||(S.slides.length===0?'표지':`슬라이드 ${S.slides.length+1}`);
  S.slides.push(mkSlide(n));
  renderList();
}
function addIfEmpty(){if(!S.slides.length)addSlide();}

function renderList(){
  document.getElementById('slide-list').innerHTML=S.slides.map((s,i)=>`
    <div class="slide-item ${S.cur?.id===s.id?'active':''}" onclick="selSlide(${i})">
      <div class="slide-num">${i+1}</div>
      <div class="slide-info">
        <div class="slide-title-txt">${s.name}</div>
        <div class="slide-sub">${s.copy?s.copy.slice(0,22)+(s.copy.length>22?'…':''):'텍스트 없음'}</div>
      </div>
      <div class="slide-thumb">${s.img?`<img src="${s.img}">`:'🖼'}</div>
    </div>`).join('');
}

function selSlide(i){S.cur=S.slides[i];go('editor');loadEditor();}
function v(id){return document.getElementById(id);}

function loadEditor(){
  if(!S.cur)return;
  v('ed-empty').style.display='none';
  v('ed-content').style.display='block';
  v('ed-title').textContent=S.cur.name;
  const s=S.cur;
  v('i-copy').value=s.copy; v('i-desc').value=s.desc; v('i-foot').value=s.foot;
  v('t-wide').checked=s.wide;
  v('t-copy').checked=s.showCopy; v('t-desc').checked=s.showDesc;
  v('t-foot').checked=s.showFoot; v('t-num').checked=s.showNum;
  v('s-font').value=s.font; v('s-csize').value=s.csize; v('s-color').value=s.textColor;
  v('s-tracking').value=s.tracking; v('trv').textContent=s.tracking+'px';
  v('s-lh-copy').value=Math.round(s.lhCopy*100); v('lhcv').textContent=s.lhCopy.toFixed(2);
  v('s-lh-desc').value=Math.round(s.lhDesc*100); v('lhdv').textContent=s.lhDesc.toFixed(2);
  v('s-opacity').value=s.opacity; v('opv').textContent=s.opacity+'%';
  v('s-ovstart').value=s.ovStart; v('osv').textContent=s.ovStart+'%';
  v('s-ovcolor').value=s.ovColor||'#000000';
  const zPct=Math.round(s.cropZoom*100);
  v('s-zoom').value=zPct; v('zmv').textContent=zPct+'%';
  document.querySelectorAll('[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===s.ovType));
  v('ov-color-row').style.display=s.ovType==='solid'?'block':'none';
  showHide(); draw();
}

function showHide(){
  v('g-desc').style.display=v('t-desc').checked?'block':'none';
  v('g-foot').style.display=v('t-foot').checked?'block':'none';
}

function setOvType(btn,val){
  document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(S.cur){S.cur.ovType=val; sync();}
  v('ov-color-row').style.display=val==='solid'?'block':'none';
  draw();
}

function sync(){
  if(!S.cur)return;
  const s=S.cur;
  s.copy=v('i-copy').value; s.desc=v('i-desc').value; s.foot=v('i-foot').value;
  s.wide=v('t-wide').checked;
  s.showCopy=v('t-copy').checked; s.showDesc=v('t-desc').checked;
  s.showFoot=v('t-foot').checked; s.showNum=v('t-num').checked;
  s.font=v('s-font').value; s.csize=+v('s-csize').value; s.textColor=v('s-color').value;
  s.tracking=+v('s-tracking').value;
  s.lhCopy=+v('s-lh-copy').value/100;
  s.lhDesc=+v('s-lh-desc').value/100;
  s.opacity=+v('s-opacity').value; s.ovStart=+v('s-ovstart').value;
  s.ovColor=v('s-ovcolor').value;
  const activeOv=document.querySelector('[data-v].active');
  if(activeOv)s.ovType=activeOv.dataset.v;
}

function setFmt(btn){
  document.querySelectorAll('#tab-setup .btn-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.fmt={w:+btn.dataset.w,h:+btn.dataset.h,r:btn.dataset.r};
  if(S.cur)draw();
}

function loadImg(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    if(!S.cur)return;
    const img=new Image();
    img.onload=()=>{
      S.cur.img=e.target.result;
      S.cur.imgEl=img;
      resetCrop();
      renderList();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}

function resetCrop(){
  if(!S.cur)return;
  S.cur.cropX=0; S.cur.cropY=0; S.cur.cropZoom=1;
  v('s-zoom').value=100; v('zmv').textContent='100%';
  draw();
}

function onZoom(){
  if(!S.cur)return;
  S.cur.cropZoom=+v('s-zoom').value/100;
  clampCrop(S.cur);
  draw();
}

// 클램핑 없음 — 자유롭게 이동 가능
function clampCrop(s){ }

// ── 드래그 / 핀치 ────────────────────────────────────────
const DRAG={active:false, startX:0, startY:0, origX:0, origY:0};
const PINCH={active:false, startDist:0, origZoom:1};

const cw=v('crop-wrap');

function getPos(e){
  if(e.touches) return{x:e.touches[0].clientX, y:e.touches[0].clientY};
  return{x:e.clientX, y:e.clientY};
}
function getDist(e){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

cw.addEventListener('mousedown', e=>{
  if(!S.cur?.imgEl)return;
  DRAG.active=true;
  const p=getPos(e);
  DRAG.startX=p.x; DRAG.startY=p.y;
  DRAG.origX=S.cur.cropX; DRAG.origY=S.cur.cropY;
  e.preventDefault();
},{passive:false});

cw.addEventListener('touchstart', e=>{
  if(!S.cur?.imgEl)return;
  if(e.touches.length===2){
    DRAG.active=false;
    PINCH.active=true;
    PINCH.startDist=getDist(e);
    PINCH.origZoom=S.cur.cropZoom;
    e.preventDefault();
  } else if(e.touches.length===1){
    DRAG.active=true;
    const p=getPos(e);
    DRAG.startX=p.x; DRAG.startY=p.y;
    DRAG.origX=S.cur.cropX; DRAG.origY=S.cur.cropY;
  }
},{passive:false});

function onMove(e){
  if(!S.cur)return;
  const cw=v('crop-wrap');
  const scale=S.fmt.w/cw.offsetWidth; // 화면→캔버스 좌표 변환
  if(PINCH.active&&e.touches?.length===2){
    const d=getDist(e);
    const z=PINCH.origZoom*(d/PINCH.startDist);
    S.cur.cropZoom=Math.max(0.5,Math.min(3,z));
    v('s-zoom').value=Math.round(S.cur.cropZoom*100);
    v('zmv').textContent=Math.round(S.cur.cropZoom*100)+'%';
    clampCrop(S.cur); draw();
    e.preventDefault();
  } else if(DRAG.active){
    const p=getPos(e);
    const dx=(p.x-DRAG.startX)*scale;
    const dy=(p.y-DRAG.startY)*scale;
    S.cur.cropX=DRAG.origX+dx;
    S.cur.cropY=DRAG.origY+dy;
    clampCrop(S.cur); draw();
    if(e.cancelable)e.preventDefault();
  }
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove,{passive:false});

function onEnd(){DRAG.active=false; PINCH.active=false;}
document.addEventListener('mouseup', onEnd);
document.addEventListener('touchend', onEnd);

// 힌트 자동 숨김
let hintTimer;
function showHint(){
  const h=v('crop-hint');
  h.classList.remove('hide');
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>h.classList.add('hide'),2500);
}

// ── 그리기 유틸 ───────────────────────────────────────────
function wrap(ctx,text,maxW){
  const res=[];
  text.split('\n').forEach(part=>{
    let ln='';
    for(const ch of part){
      const t=ln+ch;
      if(ctx.measureText(t).width>maxW&&ln){res.push(ln);ln=ch;}
      else ln=t;
    }
    if(ln)res.push(ln);
  });
  return res.length?res:[''];
}
function hexRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function hexAlpha(hex,a){const{r,g,b}=hexRgb(hex);return`rgba(${r},${g},${b},${a})`;}

function drawOverlay(ctx,s,w,h,imgY,imgH){
  const top=(s.wide&&imgY!=null)?imgY:0;
  const bottom=(s.wide&&imgY!=null)?imgY+imgH:h;
  const ov=s.opacity/100;
  if(s.ovType==='gradient'){
    const sy=top+(bottom-top)*(s.ovStart/100);
    const g=ctx.createLinearGradient(0,sy,0,bottom);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,`rgba(0,0,0,${ov})`);
    ctx.fillStyle=g; ctx.fillRect(0,sy,w,bottom-sy);
  }else if(s.ovType==='solid'){
    const c=hexRgb(s.ovColor||'#000000');
    ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${ov})`;
    ctx.fillRect(0,top,w,bottom-top);
  }
}

function drawMag(ctx,s,w,h,PAD,isWide){
  ctx.letterSpacing='1px';
  ctx.font=`600 ${S.magSize*2}px ${MAG_FONT}`;
  ctx.textAlign='right'; ctx.globalAlpha=1;
  ctx.fillStyle=isWide?hexAlpha('#111111',S.magOpacity/100):hexAlpha(S.magColor,S.magOpacity/100);
  ctx.fillText(S.magName,w-PAD,h-PAD+S.magSize*0.8);
  ctx.textAlign='left'; ctx.letterSpacing='0px';
}

function drawText(ctx,s,w,h,PAD,fontFam){
  const tc=s.textColor||'#ffffff';
  const lhC=s.csize*(s.lhCopy||1.25);
  const descSz=Math.round(s.csize*0.62);
  const footSz=Math.round(s.csize*0.37);
  const lhD=descSz*(s.lhDesc||1.45);
  ctx.textAlign='left';
  const footY=h-PAD+footSz*0.3;
  let curY=h-PAD*2;
  if(s.showFoot&&s.foot)curY-=footSz*1.6;
  if(s.showCopy&&s.copy){
    ctx.font=`700 ${s.csize}px ${fontFam}`;
    const lines=wrap(ctx,s.copy,w-PAD*2);
    const sy=curY-(lines.length-1)*lhC;
    ctx.fillStyle=tc; ctx.globalAlpha=1;
    lines.forEach((ln,i)=>ctx.fillText(ln,PAD,sy+i*lhC));
    curY=sy-lhC*0.4;
  }
  if(s.showDesc&&s.desc){
    ctx.font=`700 ${descSz}px ${fontFam}`;
    const lines=wrap(ctx,s.desc,w-PAD*2);
    const sy=curY-(lines.length-1)*lhD;
    ctx.fillStyle=tc; ctx.globalAlpha=0.92;
    lines.forEach((ln,i)=>ctx.fillText(ln,PAD,sy+i*lhD));
    ctx.globalAlpha=1;
  }
  if(s.showFoot&&s.foot){
    ctx.font=`400 ${footSz}px ${fontFam}`;
    ctx.fillStyle=tc; ctx.globalAlpha=1;
    ctx.fillText(s.foot,PAD,footY);
  }
  if(s.showNum){
    const idx=S.slides.findIndex(x=>x.id===s.id)+1;
    ctx.font=`400 ${footSz}px ${fontFam}`;
    ctx.fillStyle=tc; ctx.globalAlpha=0.5; ctx.textAlign='right';
    ctx.fillText(`${idx} / ${S.slides.length}`,w-PAD,PAD);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

function drawTextWide(ctx,s,w,h,imgY,imgH,PAD,fontFam){
  const tc=s.textColor||'#111111';
  const lhC=s.csize*(s.lhCopy||1.25);
  const descSz=Math.round(s.csize*0.62);
  const footSz=Math.round(s.csize*0.37);
  const lhD=descSz*(s.lhDesc||1.45);
  const textTop=imgY+imgH, textH=h-textTop;
  ctx.font=`700 ${s.csize}px ${fontFam}`;
  const copyLines=s.showCopy&&s.copy?wrap(ctx,s.copy,w-PAD*2):[];
  ctx.font=`700 ${descSz}px ${fontFam}`;
  const descLines=s.showDesc&&s.desc?wrap(ctx,s.desc,w-PAD*2):[];
  const totalH=(copyLines.length>0?copyLines.length*lhC:0)+(descLines.length>0?descLines.length*lhD+lhC*0.3:0)+(s.showFoot&&s.foot?footSz*1.8:0);
  let curY=textTop+(textH-totalH)/2+(copyLines.length>0?s.csize:descSz);
  if(descLines.length>0){
    ctx.font=`700 ${descSz}px ${fontFam}`;
    ctx.fillStyle=tc; ctx.globalAlpha=0.92; ctx.textAlign='left';
    descLines.forEach((ln,i)=>ctx.fillText(ln,PAD,curY+i*lhD));
    curY+=descLines.length*lhD+lhC*0.3; ctx.globalAlpha=1;
  }
  if(copyLines.length>0){
    ctx.font=`700 ${s.csize}px ${fontFam}`;
    ctx.fillStyle=tc; ctx.globalAlpha=1; ctx.textAlign='left';
    copyLines.forEach((ln,i)=>ctx.fillText(ln,PAD,curY+i*lhC));
    curY+=copyLines.length*lhC+footSz*0.8;
  }
  if(s.showFoot&&s.foot){
    ctx.font=`400 ${footSz}px ${fontFam}`;
    ctx.fillStyle=tc; ctx.globalAlpha=1; ctx.textAlign='left';
    ctx.fillText(s.foot,PAD,curY);
  }
  if(s.showNum){
    const idx=S.slides.findIndex(x=>x.id===s.id)+1;
    ctx.font=`400 ${footSz}px ${fontFam}`;
    ctx.fillStyle='#111'; ctx.globalAlpha=0.4; ctx.textAlign='right';
    ctx.fillText(`${idx} / ${S.slides.length}`,w-PAD,textTop+PAD);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

// ── 이미지 그리기 (크롭 적용) ────────────────────────────
function drawImage(ctx, imgEl, s, w, h){
  if(!imgEl)return{imgY:0,imgH:h};
  if(s.wide){
    // 가로형: 원본 비율 유지, 가로 꽉 채움, 세로 중앙
    const sc=(w/imgEl.width)*s.cropZoom;
    const iw=imgEl.width*sc, ih=imgEl.height*sc;
    const baseY=(h-ih)/2;
    const imgY=Math.round(baseY);
    const imgH=Math.round(ih);
    ctx.drawImage(imgEl, (w-iw)/2+s.cropX, imgY+s.cropY, iw, ih);
    return{imgY, imgH};
  } else {
    // 일반: cover + 크롭
    const sc=Math.max(w/imgEl.width, h/imgEl.height)*s.cropZoom;
    const iw=imgEl.width*sc, ih=imgEl.height*sc;
    ctx.drawImage(imgEl, (w-iw)/2+s.cropX, (h-ih)/2+s.cropY, iw, ih);
    return{imgY:0, imgH:h};
  }
}

// ── 메인 draw ─────────────────────────────────────────────
function draw(){
  if(!S.cur)return;
  const s=S.cur;
  const{w,h}=S.fmt;
  const cv=v('cv'), cw=v('crop-wrap');
  cv.width=w; cv.height=h;
  const dw=cw.offsetWidth||340;
  cv.style.width=dw+'px'; cv.style.height=(dw*h/w)+'px';
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const PAD=72;
  const fontFam=s.font==='global'?S.globalFont:s.font;
  ctx.letterSpacing=(s.tracking||0)+'px';

  if(s.wide){
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,w,h);
    const{imgY,imgH}=drawImage(ctx,s.imgEl,s,w,h);
    drawOverlay(ctx,s,w,h,imgY,imgH);
    drawTextWide(ctx,s,w,h,imgY,imgH,PAD,fontFam);
    drawMag(ctx,s,w,h,PAD,true);
  } else {
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,w,h);
    drawImage(ctx,s.imgEl,s,w,h);
    drawOverlay(ctx,s,w,h,null,null);
    drawText(ctx,s,w,h,PAD,fontFam);
    drawMag(ctx,s,w,h,PAD,false);
  }
}

// ── 내보내기 ──────────────────────────────────────────────
function exportOne(){
  sync(); draw();
  setTimeout(()=>{
    const a=document.createElement('a');
    const idx=S.slides.findIndex(x=>x.id===S.cur?.id)+1;
    a.download=`card_${idx}_${S.fmt.r.replace(':','x')}.png`;
    a.href=v('cv').toDataURL('image/png'); a.click();
  },300);
}
function exportAll(){
  const prev=S.cur;
  S.slides.forEach((sl,i)=>{
    setTimeout(()=>{
      S.cur=sl; loadEditor();
      setTimeout(()=>{
        const a=document.createElement('a');
        a.download=`card_${i+1}_${S.fmt.r.replace(':','x')}.png`;
        a.href=v('cv').toDataURL('image/png'); a.click();
        if(i===S.slides.length-1){S.cur=prev; loadEditor();}
      },350);
    },i*700);
  });
}

// ── 탭 전환 ───────────────────────────────────────────────
function go(name){
  ['setup','slides','editor'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.querySelectorAll('.section')[i].classList.toggle('active',n===name);
  });
  if(name==='slides')renderList();
  if(name==='editor'&&S.cur){draw(); showHint();}
}

addSlide('표지');
</script>
